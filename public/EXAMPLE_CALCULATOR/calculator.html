<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h2>Calculator</h2>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
        <div class="calculator">
            <input type="text" id="display" readonly>
            <div class="buttons">
                <button onclick="clearDisplay()" class="btn-clear">C</button>
                <button onclick="appendValue('/')" class="btn-op">/</button>
                <button onclick="appendValue('*')" class="btn-op">*</button>
                <button onclick="appendValue('-')" class="btn-op">-</button>
                
                <button onclick="appendValue('7')">7</button>
                <button onclick="appendValue('8')">8</button>
                <button onclick="appendValue('9')">9</button>
                <button onclick="appendValue('+')" class="btn-op">+</button>
                
                <button onclick="appendValue('4')">4</button>
                <button onclick="appendValue('5')">5</button>
                <button onclick="appendValue('6')">6</button>
                <button onclick="calculate()" class="btn-equal">=</button>
                
                <button onclick="appendValue('1')">1</button>
                <button onclick="appendValue('2')">2</button>
                <button onclick="appendValue('3')">3</button>
                <button onclick="appendValue('0')">0</button>
            </div>
        </div>
    </div>

    <script>
        const display = document.getElementById('display');

        function appendValue(val) {
            display.value += val;
        }

        function clearDisplay() {
            display.value = '';
        }

        function calculate() {
            try {
                // eval() is used here for simplicity in a demo, but evaluate carefully in production
                display.value = eval(display.value);
            } catch (error) {
                display.value = 'Error';
            }
        }
    </script>
</body>
</html>
