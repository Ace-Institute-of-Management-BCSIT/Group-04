<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - Sessions</title>
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/sessions.css">
</head>
<body>
    <div id="navbar-placeholder"></div>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h1 class="gradient-text">My Sessions</h1>
                <p>Manage your skill exchange sessions</p>
                <button onclick="showScheduleModal()" class="btn btn-primary">+ Schedule New Session</button>
            </div>

            <div id="sessionsList" class="grid-3"></div>
        </div>
    </main>

    <!-- Schedule New Session Modal -->
    <div id="scheduleModal" class="modal">
        <div class="modal-content">
            <h2>Schedule New Session</h2>
            <form id="scheduleForm">
                <div class="form-group">
                    <label>Teacher ID</label>
                    <input type="number" id="teacherId" placeholder="Enter teacher user ID" required>
                </div>
                <div class="form-group">
                    <label>Skill / Topic</label>
                    <input type="text" id="skill" placeholder="e.g. React JS, Guitar, Yoga" required>
                </div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Time</label>
                        <input type="time" id="time" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Duration (minutes)</label>
                    <input type="number" id="duration" value="60" required>
                </div>
                <div class="form-group">
                    <label>Location / Platform</label>
                    <input type="text" id="location" placeholder="e.g. Zoom / Kathmandu Cafe" required>
                </div>
                <div class="form-group">
                    <label>Price (₹)</label>
                    <input type="number" id="price" value="800" required>
                </div>
                <button type="submit" class="btn btn-primary">Schedule Session</button>
                <button type="button" onclick="hideScheduleModal()" class="btn btn-outline">Cancel</button>
            </form>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script src="../js/sessions.js"></script>
</body>
</html>
