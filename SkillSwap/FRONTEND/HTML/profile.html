<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - My Profile Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../CSS/style.css">
    <link rel="stylesheet" href="../CSS/user-profile.css"> </head>
<body>
    <header class="header glass">
        <div class="container header-content">
            <div class="logo">
                <i class="fa-solid fa-star-four-points" style="color: #2ecc71;"></i>
                <span>SkillSwap</span>
            </div>
            <nav class="nav">
                <a href="home.html" class="nav-link">Home</a>
                <a href="find-skills.html" class="nav-link">Find Skills</a>
                <a href="message.html" class="nav-link">Messages</a>
            </nav>
            <div class="nav-actions">
                <div class="profile-dropdown">
                    <button class="profile-btn" id="profileBtn">
                        <i class="fa-regular fa-user" style="color: #2ecc71;"></i>
                        <span class="profile-name" id="navUsername">My Dashboard</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main class="main-content" style="min-height: calc(100vh - 200px); padding-bottom:60px;">
        <div class="container" id="profileContainer">
            <div class="loading">Initializing core secure stack layers...</div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-inner">
          <div class="footer-brand">
            <div class="footer-logo">
              <div class="footer-logo-icon">SS</div>
              <span>SkillSwap</span>
            </div>
            <p>Connecting service providers and clients through a trusted skill-sharing marketplace.</p>
          </div>
          <div class="footer-col">
            <h4>Platform</h4>
            <a href="#">How It Works</a>
            <a href="#">Safety Guidelines</a>
          </div>
          <div class="footer-col">
            <h4>Resources</h4>
            <a href="#">Blog</a>
            <a href="#">Help Center</a>
          </div>
          <div class="footer-col">
            <h4>Connect</h4>
            <div class="social-icons">
              <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="#"><i class="fa-brands fa-x-twitter"></i></a>
              <a href="#"><i class="fa-brands fa-instagram"></i></a>
            </div>
          </div>
        </div>
    </footer>

    <script src="../JS_&_JSON/api.js"></script>
    <script src="../JS_&_JSON/auth.js"></script>
    <script src="../JS_&_JSON/profile.js"></script>
    
    <script>
        protectRoute();
        updateNavbarVisibility();
        bindNavbarHandlers();

        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;

        function setTheme(theme) {
            const isLight = theme === 'light';
            html.classList.toggle('light', isLight);
            html.classList.toggle('dark', !isLight);

            if (themeToggle) {
                themeToggle.innerHTML = isLight
                    ? `<i class="fa-solid fa-moon"></i>`
                    : `<i class="fa-solid fa-sun"></i>`;
            }
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
        }

        const savedTheme = localStorage.getItem('theme');
        setTheme(savedTheme === 'light' ? 'light' : 'dark');

        themeToggle?.addEventListener('click', () => {
            setTheme(html.classList.contains('light') ? 'dark' : 'light');
        });

        document.querySelectorAll('.btn-filter').forEach((button) => {
            button.addEventListener('click', function () {
                document.querySelectorAll('.btn-filter').forEach((activeButton) => {
                    activeButton.classList.remove('active');
                });
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>
