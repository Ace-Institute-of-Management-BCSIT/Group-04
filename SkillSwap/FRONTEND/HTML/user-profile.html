<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillSwap - User Profile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link rel="stylesheet" href="../CSS/find-skills.css">
    <link rel="stylesheet" href="../CSS/user-profile.css">
</head>
<body>
    <!-- NAVBAR -->
    <header class="header glass">
        <div class="container header-content">
            <div class="logo">
                <i class="fa-solid fa-star-four-points"></i>
                <span>SkillSwap</span>
            </div>

            <nav class="nav">
                <a href="home.html" class="nav-link">Home</a>
                <a href="find-skills.html" class="nav-link">Find Skills</a>
                <a href="chat.html" class="nav-link">Messages</a>
                <!-- <a href="blog.html" class="nav-link">Blog</a> -->
                <a href="about.html" class="nav-link">About</a>
            </nav>

            <div class="nav-actions">
                <button class="theme-toggle" id="themeToggle">
                    <i class="fa-solid fa-sun sun-icon"></i>
                    <i class="fa-solid fa-moon moon-icon"></i>
                </button>

                <div class="profile-dropdown" data-auth="profile">
                    <button class="profile-btn" id="profileBtn">
                        <i class="fa-regular fa-user"></i>
                        <span class="profile-name">Profile</span>
                    </button>
                    <div class="dropdown-menu" id="dropdownMenu">
                        <a href="profile.html" class="dropdown-item"><i class="fa-regular fa-user"></i> My Profile</a>
                        <a href="find-skills.html" class="dropdown-item"><i class="fa-regular fa-bookmark"></i> Browse Skills</a>
                        <a href="message.html" class="dropdown-item"><i class="fa-regular fa-message"></i> Messages</a>
                        <div class="dropdown-divider"></div>
                        <a href="#" class="dropdown-item logout"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
                    </div>
                </div>

                 <button class="btn btn-primary" data-auth="join" type="button" onclick="window.location.href='login.html'">Join Now</button>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="container" id="profileContainer">
            <!-- Dynamically loaded by JS -->
            <div class="loading">Loading profile...</div>
        </div>
    </main>

    <div id="reportModal" class="modal hidden" aria-hidden="true">
        <div class="modal-content glass">
            <button class="modal-close" id="closeReportModal" type="button" aria-label="Close report dialog">×</button>
            <h3>Report User</h3>
            <p class="modal-subtext">Let us know why you are reporting this profile.</p>

            <div class="form-group">
                <label for="reportReason">Reason</label>
                <select id="reportReason">
                    <option value="">Select a reason</option>
                    <option value="Spam">Spam</option>
                    <option value="Fake Profile">Fake Profile</option>
                    <option value="Harassment">Harassment</option>
                    <option value="Inappropriate Content">Inappropriate Content</option>
                    <option value="Scam or Fraud">Scam or Fraud</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group hidden" id="reportDescriptionGroup">
                <label for="reportDescription">Details</label>
                <textarea id="reportDescription" rows="4" placeholder="Please tell us more..."></textarea>
            </div>

            <div class="form-message hidden" id="reportMessage"></div>

            <div class="modal-actions">
                <button class="btn btn-outline" id="cancelReportBtn" type="button">Cancel</button>
                <button class="btn btn-primary" id="submitReportBtn" type="button">Submit Report</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <!-- Same footer as find-skills.html -->
        <div class="footer-inner">
            <div class="footer-brand">
                <div class="footer-logo">
                    <div class="footer-logo-icon">SS</div>
                    <span>SkillSwap</span>
                </div>
                <p>Connecting learners and teachers worldwide through skill exchange.</p>
            </div>
            <!-- other footer columns -->
        </div>
    </footer>

    <script src="../JS_&_JSON/api.js"></script>
    <script src="../JS_&_JSON/auth.js"></script>
    <script src="../JS_&_JSON/user-profile.js"></script>
    <script src="../JS_&_JSON/script.js"></script>
    <script src="../JS_&_JSON/api.js"></script>
<script src="../JS_&_JSON/notifications.js"></script>

</body>
</html>
